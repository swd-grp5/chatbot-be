spring.application.name=SWDChatBox
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:${MYSQL_PORT:3306}/${MYSQL_DATABASE:swdchatbox}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8

spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

# JWT
app.jwt.secret=${JWT_SECRET:SWD_CHATBOX_SECRET_KEY_123456789_SWD_CHATBOX_SECRET_KEY}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.short-expiration-ms=${JWT_SHORT_EXPIRATION_MS:3600000}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui

# Google Sign-In
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Mail (verify email)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${spring.mail.username}}
app.mail.from-name=${MAIL_FROM_NAME:SWDChatBox}
app.mail.reply-to=${MAIL_REPLY_TO:}
app.mail.verify-base-url=${VERIFY_BASE_URL:http://localhost:8080}

# ──────────────── AI Configuration ────────────────
# Provider: "gemini" or "openai"
app.ai.provider=${AI_PROVIDER:gemini}

# Gemini API
app.ai.gemini-api-key=${GEMINI_API_KEY:}
app.ai.gemini-chat-model=${GEMINI_CHAT_MODEL:gemini-2.0-flash}
app.ai.gemini-embedding-model=${GEMINI_EMBEDDING_MODEL:text-embedding-004}

# OpenAI API
app.ai.openai-api-key=${OPENAI_API_KEY:}
app.ai.openai-chat-model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
app.ai.openai-embedding-model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

# Generation parameters
app.ai.temperature=${AI_TEMPERATURE:0.3}
app.ai.max-tokens=${AI_MAX_TOKENS:2048}
app.ai.embedding-dimension=${AI_EMBEDDING_DIMENSION:768}

# RAG parameters
app.ai.retrieval-top-k=${AI_RETRIEVAL_TOP_K:5}
app.ai.retrieval-score-threshold=${AI_RETRIEVAL_SCORE_THRESHOLD:0.5}
app.ai.conversation-history-limit=${AI_CONVERSATION_HISTORY_LIMIT:10}

# Qdrant Vector Database
app.ai.qdrant-host=${QDRANT_HOST:localhost}
app.ai.qdrant-port=${QDRANT_PORT:6333}
app.ai.qdrant-collection-name=${QDRANT_COLLECTION_NAME:swd_documents}