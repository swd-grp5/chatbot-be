spring.config.import=optional:file:../.env[.properties]

spring.application.name=SWDChatBox
server.port=8080

# Production: set SPRING_DATASOURCE_URL on the host (DigitalOcean App Platform).
# Local: MYSQL_HOST / MYSQL_PORT / MYSQL_DATABASE or docker-compose defaults.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:swdchatbox}?useSSL=${MYSQL_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

# JWT (set in .env locally or App Platform env in production)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}
app.jwt.short-expiration-ms=${JWT_SHORT_EXPIRATION_MS}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui

# Google Sign-In
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Mail (set in .env locally or App Platform env in production)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM}
app.mail.from-name=${MAIL_FROM_NAME}
app.mail.reply-to=${MAIL_REPLY_TO:}
app.mail.verify-base-url=${VERIFY_BASE_URL}

# Multipart upload (set in .env locally or App Platform env in production)
spring.servlet.multipart.enabled=${MULTIPART_ENABLED}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE}

# Document storage
app.storage.documents.base-path=${STORAGE_DOCUMENTS_BASE_PATH}
app.storage.documents.checksum-algorithm=${STORAGE_DOCUMENTS_CHECKSUM_ALGORITHM}