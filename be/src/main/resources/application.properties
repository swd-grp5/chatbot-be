spring.application.name=SWDChatBox
server.port=8080

# Production: set SPRING_DATASOURCE_URL on the host (DigitalOcean App Platform).
# Local: MYSQL_HOST / MYSQL_PORT / MYSQL_DATABASE or docker-compose defaults.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:swdchatbox}?useSSL=${MYSQL_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:../../.env[.properties]

# JWT (set in .env locally or App Platform env in production)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}
app.jwt.short-expiration-ms=${JWT_SHORT_EXPIRATION_MS}

# Public API URL (Swagger server + email links; set APP_PUBLIC_URL on DigitalOcean)
# Leave empty locally if you only want localhost to appear in Swagger UI.
app.public-url=${APP_PUBLIC_URL:https://chat-bot-be-5ceqa.ondigitalocean.app}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs
server.forward-headers-strategy=framework

# Google Sign-In
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Mail (Resend)
app.mail.from=${SPRING_MAIL_FROM:}
app.mail.from-name=${SPRING_MAIL_FROM_NAME:SWDChatBox}
app.mail.reply-to=${SPRING_MAIL_REPLY_TO:}
app.mail.verify-base-url=${VERIFY_BASE_URL:${APP_PUBLIC_URL:http://localhost:8080}}
app.mail.resend.api-key=${RESEND_API_KEY:${SENDGRID_API_KEY:}}

# Multipart upload (set in .env locally or App Platform env in production)
spring.servlet.multipart.enabled=${MULTIPART_ENABLED}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE}


# Storage (local fallback when AWS_S3_BUCKET is empty)
app.storage.documents.base-path=${STORAGE_DOCUMENTS_BASE_PATH:uploads/documents}
app.storage.documents.checksum-algorithm=${STORAGE_DOCUMENTS_CHECKSUM_ALGORITHM:SHA-256}
app.storage.documents.s3.bucket=${AWS_S3_BUCKET:}
app.storage.documents.s3.region=${AWS_S3_REGION:ap-southeast-2}
app.storage.documents.s3.access-key-id=${AWS_ACCESS_KEY_ID:}
app.storage.documents.s3.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
app.storage.documents.s3.key-prefix=${AWS_S3_KEY_PREFIX:documents}

# VNPAY (Sandbox / TEST environment)
# Thong tin bi mat doc tu bien moi truong (.env), khong commit gia tri that
app.vnpay.tmn-code=${VNPAY_TMN_CODE}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET}
app.vnpay.return-url=${VNPAY_RETURN_URL}
app.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.version=${VNPAY_VERSION:2.1.0}
app.vnpay.command=${VNPAY_COMMAND:pay}
app.vnpay.order-type=${VNPAY_ORDER_TYPE:other}
app.vnpay.locale=${VNPAY_LOCALE:vn}
app.vnpay.currency-code=${VNPAY_CURRENCY_CODE:VND}
app.vnpay.expire-minutes=${VNPAY_EXPIRE_MINUTES:15}

