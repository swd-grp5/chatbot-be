spring.application.name=SWDChatBox
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:${MYSQL_PORT:3306}/${MYSQL_DATABASE:swdchatbox}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8

spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

# Load local .env files automatically when available
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:../../.env[.properties]

# JWT
app.jwt.secret=${JWT_SECRET:SWD_CHATBOX_SECRET_KEY_123456789_SWD_CHATBOX_SECRET_KEY}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.short-expiration-ms=${JWT_SHORT_EXPIRATION_MS:3600000}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui

# Google Sign-In
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Mail (Resend)
app.mail.from=${MAIL_FROM:${SPRING_MAIL_FROM:}}
app.mail.from-name=${MAIL_FROM_NAME:${SPRING_MAIL_FROM_NAME:SWDChatBox}}
app.mail.reply-to=${MAIL_REPLY_TO:${SPRING_MAIL_REPLY_TO:}}
app.mail.verify-base-url=${VERIFY_BASE_URL:${APP_PUBLIC_URL:http://localhost:8080}}
app.mail.resend.api-key=${RESEND_API_KEY:${SENDGRID_API_KEY:}}

# Multipart upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:200MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:250MB}

# Storage
app.storage.documents.base-path=uploads/documents
app.storage.documents.checksum-algorithm=SHA-256

# VNPAY (Sandbox / TEST environment)
# Thong tin bi mat doc tu bien moi truong (.env), khong commit gia tri that
app.vnpay.tmn-code=${VNPAY_TMN_CODE}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET}
app.vnpay.return-url=${VNPAY_RETURN_URL}
app.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.version=${VNPAY_VERSION:2.1.0}
app.vnpay.command=${VNPAY_COMMAND:pay}
app.vnpay.order-type=${VNPAY_ORDER_TYPE:other}
app.vnpay.locale=${VNPAY_LOCALE:vn}
app.vnpay.currency-code=${VNPAY_CURRENCY_CODE:VND}
app.vnpay.expire-minutes=${VNPAY_EXPIRE_MINUTES:15}