name: swdchatbox

services:
  mysql:
    image: mysql:8.4
    container_name: swdchatbox

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-swd_chatbox}
      MYSQL_USER: ${MYSQL_USER:-swd_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in stack env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in stack env}

    ports:
      - "${MYSQL_PORT:-3306}:3306"

    volumes:
      - swdchatbox:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

    command:
      [
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci"
      ]

volumes:
  swdchatbox: