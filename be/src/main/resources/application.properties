spring.application.name=SWDChatBox
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:${MYSQL_PORT:3306}/${MYSQL_DATABASE:swdchatbox}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8

spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

# JWT
app.jwt.secret=${JWT_SECRET:SWD_CHATBOX_SECRET_KEY_123456789_SWD_CHATBOX_SECRET_KEY}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.short-expiration-ms=${JWT_SHORT_EXPIRATION_MS:3600000}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui

# Google Sign-In
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Mail (verify email)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${spring.mail.username}}
app.mail.from-name=${MAIL_FROM_NAME:SWDChatBox}
app.mail.reply-to=${MAIL_REPLY_TO:}
app.mail.verify-base-url=${VERIFY_BASE_URL:http://localhost:8080}